<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EDRA Lounge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!--
    Phase 1 stub — full mockup port lands in Phase 2.
    The three-panel layout from edra_lounge_mockup.html goes here:
      left    .counter        (visitor sprite + offer bubble + persona card)
      centre  .episode-stream (log + UMAP canvas)
      right   .rulebook       (rule cards + reflection console)
  -->

  <header class="app-header">
    <h1>EDRA Lounge</h1>
    <div class="controls">
      <button id="btn-bubble-pops">💥 AI Bubble Pops</button>
      <button id="btn-new-segment">👤+ New Segment</button>
      <button id="btn-expert-view">⚙ Expert View</button>
    </div>
  </header>

  <main class="grid">
    <section id="counter" class="panel">
      <h2>The Counter</h2>
      <div id="visitor-slot"></div>
    </section>

    <section id="episode-stream" class="panel">
      <h2>Episode Stream</h2>
      <ol id="episode-list"></ol>
      <canvas id="umap-canvas" width="320" height="200"></canvas>
    </section>

    <section id="rulebook" class="panel">
      <h2>Rulebook</h2>
      <ul id="rule-list"></ul>
      <aside id="reflection-console" class="hidden"></aside>
    </section>
  </main>

  <footer class="clock"><span id="clock">day 1 · 09:00</span></footer>

  <script src="./app.js"></script>
</body>
</html>
