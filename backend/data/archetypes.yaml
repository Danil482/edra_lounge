# Seeded archetypes — TASK.md §5.1 + §5.2.
#
# Six default + two spawnable. Each archetype has:
#   - profile:    full Profile fields (name, role, domain, seniority, headline,
#                 archetype_summary, recent_signals)
#   - preferences: per-slot affinity dicts + sparse combo_bonuses
#   - spawnable:   bool (default false). True = excluded from default rotation;
#                  appears only after operator clicks "👤+ New Segment" or
#                  POST /simulator/inject_archetype.
#
# Affinity values in [0, 1]. Combo bonuses are added on top of the weighted
# affinity sum. Score formula and weights live in backend/simulator/preferences.py
# per TASK.md §5.2.
#
# Invariant (verified by tests/test_preferences.py): every archetype's top-K
# pitch combinations are unique to that archetype.

archetypes:

  # ────────────────────────────────────────────────────────────────────────
  # 1. depth-seeking PhD — quiet, foundations-first, allergic to corporate-speak
  # ────────────────────────────────────────────────────────────────────────
  arch_phd_nlp_introvert:
    label: depth-seeking PhD
    spawnable: false
    profile:
      name: Anya Volkova
      role: PhD student
      domain: NLP
      seniority: early
      headline: PhD student in compositional generalisation, second year, EPFL.
      archetype_summary: >-
        Quiet doctoral student in natural language processing. Cares about formal
        foundations and reproducibility; suspicious of hype and of pitches that
        skip the mechanism. Will engage at length if the opener names something
        specific from her work and treats her as a peer rather than a recruit.
      recent_signals:
        - "Wrote a thread on why parsing benchmarks plateaued and what would actually move the needle."
        - "Asked a panel why no one publishes failure modes of fine-tuning eval sets."
        - "Reposted a paper on negative results in compositional generalisation, no comment."
    preferences:
      framing_affinity:
        strategic-alignment:   0.20
        peer-collaboration:    0.90
        knowledge-share:       0.95
        applied-curiosity:     0.50
        skeptical-respect:     0.70
        follow-up-comment:     0.60
      tone_affinity:
        formal:    0.60
        warm:      0.70
        socratic:  0.95
        direct:    0.40
        playful:   0.20
      opener_affinity:
        question:             0.90
        reference-to-signal:  0.85
        shared-context:       0.70
        credential-anchor:    0.50
        cold:                 0.10
      word_target_affinity:
        short:   0.40
        medium:  0.85
        long:    0.60
      ask_size_affinity:
        chat:       0.70
        co-author:  0.95
        intro:      0.50
        trial:      0.30
        none:       0.60
      combo_bonuses:
        - if: { framing: knowledge-share, tone: socratic, opener_type: question }
          bonus: 0.40

  # ────────────────────────────────────────────────────────────────────────
