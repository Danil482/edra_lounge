        formal:    0.20
        warm:      0.55
        socratic:  0.40
        direct:    0.85
        playful:   0.90
      opener_affinity:
        question:             0.60
        reference-to-signal:  0.75
        shared-context:       0.90
        credential-anchor:    0.50
        cold:                 0.30
      word_target_affinity:
