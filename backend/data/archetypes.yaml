      archetype_summary: >-
        Computer-vision postdoc actively building visibility for faculty
        applications and industry leads. Reads every arXiv trending list. Reacts
        well to references that anchor her existing public work and to framings
        that connect her research to a concrete ask she can name in a CV.
      recent_signals:
        - "Three years of self-supervised pretraining and we still hand-label the eval sets."
        - "Genuinely curious which industry partners are open to publishing negative results from production deployments."
        - "Submitted to NeurIPS, decision in two weeks, cross fingers."
    preferences:
      framing_affinity:
        strategic-alignment:   0.90
        peer-collaboration:    0.75
        knowledge-share:       0.60
        applied-curiosity:     0.85
        skeptical-respect:     0.30
        follow-up-comment:     0.50
      tone_affinity:
        formal:    0.60
        warm:      0.85
        socratic:  0.55
        direct:    0.70
        playful:   0.30
      opener_affinity:
        question:             0.60
        reference-to-signal:  0.90
        shared-context:       0.75
        credential-anchor:    0.85
        cold:                 0.20
      word_target_affinity:
        short:   0.65
        medium:  0.85
        long:    0.40
      ask_size_affinity:
        chat:       0.50
        co-author:  0.90
        intro:      0.85
        trial:      0.70
        none:       0.20
      combo_bonuses:
        - if: { framing: strategic-alignment, tone: warm, opener_type: reference-to-signal }
          bonus: 0.45

  # ────────────────────────────────────────────────────────────────────────
