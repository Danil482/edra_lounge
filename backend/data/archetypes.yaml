      archetype_summary: >-
        Early-stage founder building an applied-AI product. Hype-tolerant when
        it correlates with shipping; impatient with meta-science tangents. Wants
        a tight pitch and a proof-shaped ask he can answer this quarter.
        Allergic to long-form formal openers.
      recent_signals:
        - "Shipped v0.3 last night, churn down 14 points, still not profitable but the slope is right."
        - "Looking for one research collaborator who's published on calibration for LLM agents — DM me."
        - "Tired of conference talks that end with 'future work'."
    preferences:
      framing_affinity:
        strategic-alignment:   0.70
        peer-collaboration:    0.45
        knowledge-share:       0.35
        applied-curiosity:     0.95
        skeptical-respect:     0.30
        follow-up-comment:     0.50
